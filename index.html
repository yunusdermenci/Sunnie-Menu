<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f07a22" />
    <meta name="description" content="Sunnie Tattoo Art & Coffee menu" />
    <title>SUNNIE TATTOO ART & COFFEE Menu</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <button class="back-button" type="button" aria-label="Menüye geri dön">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 5 8 12l7 7" />
        </svg>
      </button>
      <div class="brand-line">
        <img src="assets/sunnie-sun.png" alt="" class="sun-icon" />
        <h1>SUNNIE TATTOO ART&amp;COFFEE</h1>
        <img src="assets/sunnie-sun.png" alt="" class="sun-icon" />
      </div>
    </header>

    <main id="app" class="app-shell" aria-live="polite"></main>

    <footer class="site-footer">
      <div class="footer-copy">
        <p>© 2024 Sunnie Tattoo Art &amp; Coffee</p>
        <p>Afiyet Olsun / Enjoy your meal</p>
      </div>
      <a href="#/admin" class="footer-admin-link">Restoran girişi</a>
    </footer>

    <div class="modal" hidden>
      <button class="modal-backdrop" type="button" aria-label="Detayı kapat"></button>
      <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" aria-label="Detayı kapat">×</button>
        <div>
          <h2 id="modal-title"></h2>
          <p id="modal-description"></p>
        </div>
        <strong id="modal-price"></strong>
      </article>
    </div>

    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
